<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url("https://i.postimg.cc/vZMbHrTt/c0d8541f82efc52aed82c3208e349c93-1.jpg") no-repeat center center/cover;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2, 6, 23, 0.7);
    z-index: 0;
}

.container {
    position: relative;
    max-width: 400px;
    margin: 60px auto;
    padding: 35px 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px #00f0ff22;
    z-index: 1;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

img {
    width: 130px;
    height: 130px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #00f0ff;
    box-shadow: 0 0 25px #00f0ff, 0 0 50px #00f0ff55;
    margin-bottom: 15px;
    transition: 0.4s;
    animation: glow 2s infinite alternate;
}

img:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px #00f0ff;
}

@keyframes glow {
    from { box-shadow: 0 0 15px #00f0ff; }
    to { box-shadow: 0 0 40px #00f0ff; }
}

h2 {
    font-size: 28px;
    margin: 10px 0 5px;
    letter-spacing: 1px;
    text-shadow: 0 0 15px #00f0ff;
}

p {
    opacity: 0.75;
    font-size: 14px;
    margin-bottom: 25px;
}

.divider {
    width: 60px;
    height: 3px;
    margin: 15px auto;
    background: linear-gradient(90deg, transparent, #00f0ff, transparent);
}

.link {
    display: block;
    background: rgba(255,255,255,0.05);
    border: 1px solid #00f0ff55;
    color: #00f0ff;
    padding: 14px;
    margin: 12px 0;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
    position: relative;
    overflow: hidden;
}

.link::before {
    content: "";
    position: absolute;
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, transparent, #00f0ff55, transparent);
    top: 0;
    left: 0;
    transition: 0.4s;
}

.link:hover::before {
    width: 100%;
}

.link:hover {
    background: linear-gradient(90deg, #00f0ff, #00c3ff);
    color: black;
    box-shadow: 0 0 25px #00f0ff;
    transform: translateY(-3px) scale(1.03);
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
