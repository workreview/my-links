<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #5a0f1a;
  color: white;
}

header {
  text-align: center;
  padding: 30px;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  height: 250px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.img-box {
  height: 75%;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.content {
  height: 25%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* VIEWER */
.viewer {
  position: fixed;
  inset: 0;
  background: #5a0f1a;
  display: none;
  flex-direction: column;
}

.viewer.active {
  display: flex;
}

.viewer-header {
  padding: 15px;
  cursor: pointer;
}

/* INSIDE FOLDER */
.viewer-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  padding: 20px;
  overflow: auto;
}

.viewer-gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.viewer-gallery img:hover {
  transform: scale(1.05);
}

/* FULLSCREEN IMAGE */
.fullscreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
}

.fullscreen.active {
  display: flex;
}

.fullscreen img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
}
</style>
</head>

<body>

<header>
  <h1>My Work</h1>
</header>

<section class="gallery">

<!-- 10 FOLDERS -->
<div class="card" onclick="openFolder(folder1)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 1</div></div>
<div class="card" onclick="openFolder(folder2)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 2</div></div>
<div class="card" onclick="openFolder(folder3)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 3</div></div>
<div class="card" onclick="openFolder(folder4)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 4</div></div>
<div class="card" onclick="openFolder(folder5)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 5</div></div>
<div class="card" onclick="openFolder(folder6)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 6</div></div>
<div class="card" onclick="openFolder(folder7)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 7</div></div>
<div class="card" onclick="openFolder(folder8)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 8</div></div>
<div class="card" onclick="openFolder(folder9)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 9</div></div>
<div class="card" onclick="openFolder(folder10)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">Project 10</div></div>

</section>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <div class="viewer-header" onclick="closeFolder()">⬅ Back</div>
  <div class="viewer-gallery" id="viewerGallery"></div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="fullscreen" onclick="closeFullscreen()">
  <img id="fullscreenImg">
</div>

<script>
const img = "https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg";

/* 10 folders × 10 images = 100 images */
const folder1 = [img,img,img,img,img,img,img,img,img,img];
const folder2 = [img,img,img,img,img,img,img,img,img,img];
const folder3 = [img,img,img,img,img,img,img,img,img,img];
const folder4 = [img,img,img,img,img,img,img,img,img,img];
const folder5 = [img,img,img,img,img,img,img,img,img,img];
const folder6 = [img,img,img,img,img,img,img,img,img,img];
const folder7 = [img,img,img,img,img,img,img,img,img,img];
const folder8 = [img,img,img,img,img,img,img,img,img,img];
const folder9 = [img,img,img,img,img,img,img,img,img,img];
const folder10 = [img,img,img,img,img,img,img,img,img,img];

/* OPEN FOLDER */
function openFolder(folder) {
  const viewer = document.getElementById("viewer");
  const gallery = document.getElementById("viewerGallery");

  gallery.innerHTML = "";

  folder.forEach(img => {
    gallery.innerHTML += `<img src="${img}" onclick="openFullscreen('${img}')">`;
  });

  viewer.classList.add("active");
}

/* CLOSE FOLDER */
function closeFolder() {
  document.getElementById("viewer").classList.remove("active");
}

/* FULLSCREEN */
function openFullscreen(src) {
  document.getElementById("fullscreenImg").src = src;
  document.getElementById("fullscreen").classList.add("active");
}

function closeFullscreen() {
  document.getElementById("fullscreen").classList.remove("active");
}
</script>

</body>
</html>
