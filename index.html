<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f7;
      color: #111;
    }header {
  text-align: center;
  padding: 50px 20px 20px;
}

header h1 {
  margin: 0;
  font-size: 2.5rem;
  font-weight: 600;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 30px;
  max-width: 1100px;
  margin: auto;
}

.card {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  transition: 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 20px rgba(0,150,255,0.2);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 15px;
}

.content h3 {
  margin: 0 0 5px;
  font-size: 1.2rem;
}

.content p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
}

/* WhatsApp Button */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 14px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 500;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Lightbox */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: 0.3s ease;
}

.lightbox.active {
  opacity: 1;
  visibility: visible;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
  transform: scale(0.8);
  transition: 0.3s ease;
}

.lightbox.active img {
  transform: scale(1);
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 2rem;
  color: white;
  cursor: pointer;
}

  </style>
</head>
<body>  <header>
    <h1>My Work</h1>
  </header>  <section class="gallery">
    <div class="card" onclick="openLightbox(this)">
      <img src="https://via.placeholder.com/400" alt="Work 1">
      <div class="content">
        <h3>Project One</h3>
        <p>Description of your work.</p>
      </div>
    </div><div class="card" onclick="openLightbox(this)">
  <img src="https://via.placeholder.com/400" alt="Work 2">
  <div class="content">
    <h3>Project Two</h3>
    <p>Description of your work.</p>
  </div>
</div>

<div class="card" onclick="openLightbox(this)">
  <img src="https://via.placeholder.com/400" alt="Work 3">
  <div class="content">
    <h3>Project Three</h3>
    <p>Description of your work.</p>
  </div>
</div>

  </section>  <!-- Lightbox Viewer -->  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="">
  </div>  <!-- KEEP YOUR ORIGINAL WHATSAPP LINK BELOW --><a class="whatsapp" href="YOUR_WHATSAPP_LINK_HERE" target="_blank">WhatsApp</a>

  <script>
    function openLightbox(card) {
      const img = card.querySelector("img").src;
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");

      lightboxImg.src = img;
      lightbox.classList.add("active");
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("active");
    }

    // close when clicking outside image
    document.getElementById("lightbox").addEventListener("click", function(e) {
      if (e.target === this) closeLightbox();
    });
  </script></body>
</html>
