<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap')
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url("https://your-image-link.jpg") no-repeat center center/cover;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* animated glowing background */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2, 6, 23, 0.7); /* dark glass overlay */
    z-index: 0;
}
@keyframes float {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(10%, 10%); }
}

/* glass container */
.container {
    position: relative;
    max-width: 400px;
    margin: 60px auto;
    padding: 35px 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px #00f0ff22;
    z-index: 1;
}

/* profile image */
img {
    width: 120px;
    border-radius: 50%;
    border: 3px solid #00f0ff;
    box-shadow: 0 0 25px #00f0ff;
    margin-bottom: 15px;
}

/* name */
h2 {
    font-size: 28px;
    margin: 10px 0 5px;
    letter-spacing: 1px;
    text-shadow: 0 0 15px #00f0ff;
}

/* bio */
p {
    opacity: 0.75;
    font-size: 14px;
    margin-bottom: 25px;
}

/* luxury divider */
.divider {
    width: 60px;
    height: 3px;
    margin: 15px auto;
    background: linear-gradient(90deg, transparent, #00f0ff, transparent);
}

/* links */
.link {
    display: block;
    background: rgba(255,255,255,0.05);
    border: 1px solid #00f0ff55;
    color: #00f0ff;
    padding: 14px;
    margin: 12px 0;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
}

/* hover effect */
.link:hover {
    background: linear-gradient(90deg, #00f0ff, #00c3ff);
    color: black;
    box-shadow: 0 0 25px #00f0ff;
    transform: translateY(-3px) scale(1.03);
}

/* footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>
