 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #5a0f1a;
  color: white;
  overflow-x: hidden;
}

/* ===== TRIANGLE BACKGROUND (RESTORED) ===== */
.bg-triangles {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.triangle {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 120px solid transparent;
  border-right: 120px solid transparent;
  border-bottom: 200px solid #6b1220;
  opacity: 0.25;
}

.triangle:nth-child(2){left:20%;top:10%;border-bottom-color:#7a1625;}
.triangle:nth-child(3){left:70%;top:30%;border-bottom-color:#4a0c16;}
.triangle:nth-child(4){left:40%;top:70%;border-bottom-color:#661320;}
.triangle:nth-child(5){left:10%;top:60%;border-bottom-color:#3d0a12;}

/* LOGO */
.logo {
  display:flex;
  justify-content:center;
  padding-top:20px;
  position:relative;
  z-index:1;
}

.logo img {
  width:180px;
  height:180px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* WHATSAPP */
.whatsapp {
  display:inline-flex;
  margin-top:15px;
  padding:14px 22px;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color:white;
}

/* ===== FOLDER LAYOUT (RESTORED STYLE) ===== */
.gallery {
  display:flex;
  gap:20px;
  padding:40px 20px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  position:relative;
  z-index:1;
}

.card {
  min-width:250px;
  height:280px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  transition:0.4s ease;
  scroll-snap-align:center;
  transform:scale(0.8);
  filter:blur(2px);
}

.card.active {
  transform:scale(1.2);
  filter:blur(0);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.img-box img {
  width:100%;
  height:80%;
  object-fit:cover;
}

.content {
  text-align:center;
  padding:10px;
}

/* VIEWER */
.viewer {
  position:fixed;
  inset:0;
  background:#5a0f1a;
  display:none;
  flex-direction:column;
  z-index:10;
}

.viewer.active {
  display:flex;
}

.viewer-gallery {
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
  overflow-y:auto;
}

.viewer-card {
  width:80%;
  margin:auto;
  border-radius:20px;
  overflow:hidden;
}

.viewer-card img {
  width:100%;
}

/* FULLSCREEN */
.fullscreen {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.fullscreen.active {
  display:flex;
}

.fullscreen img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-triangles">
  <div class="triangle"></div>
  <div class="triangle"></div>
  <div class="triangle"></div>
  <div class="triangle"></div>
  <div class="triangle"></div>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg">
</div>

<div style="text-align:center; position:relative; z-index:1;">
  <a class="whatsapp" href="https://wa.me/201007086898">WhatsApp</a>
</div>

<!-- FOLDERS -->
<section class="gallery" id="gallery">

  <div class="card" onclick="openFolder(folder1)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">1</div></div>
  <div class="card" onclick="openFolder(folder2)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">2</div></div>
  <div class="card" onclick="openFolder(folder3)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">3</div></div>
  <div class="card" onclick="openFolder(folder4)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">4</div></div>
  <div class="card" onclick="openFolder(folder5)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">5</div></div>
  <div class="card" onclick="openFolder(folder6)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">6</div></div>
  <div class="card" onclick="openFolder(folder7)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">7</div></div>
  <div class="card" onclick="openFolder(folder8)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">8</div></div>
  <div class="card" onclick="openFolder(folder9)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">9</div></div>
  <div class="card" onclick="openFolder(folder10)"><div class="img-box"><img src="https://via.placeholder.com/400"></div><div class="content">10</div></div>

</section>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <div onclick="closeFolder()" style="padding:15px;cursor:pointer;">⬅ Back</div>
  <div class="viewer-gallery" id="viewerGallery"></div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="fullscreen" onclick="closeFullscreen()">
  <img id="fullscreenImg">
</div>

<script>

const img = "https://via.placeholder.com/800";

/* YOUR EXACT STRUCTURE (kept) */
const folder1 = [img,img,img,img,img,img,img,img,img,img];
const folder2 = [img,img,img,img,img,img,img,img,img,img];
const folder3 = [img,img,img,img,img,img,img,img,img,img];
const folder4 = [img,img,img,img,img,img,img,img,img,img];
const folder5 = [img,img,img,img,img,img,img,img,img,img];
const folder6 = [img,img,img,img,img,img,img,img,img,img];
const folder7 = [img,img,img,img,img,img,img,img,img,img];
const folder8 = [img,img,img,img,img,img,img,img,img,img];
const folder9 = [img,img,img,img,img,img,img,img,img,img];
const folder10 = [img,img,img,img,img,img,img,img,img,img];

/* CENTER EFFECT (restored behavior) */
const cards = document.querySelectorAll(".card");
const gallery = document.getElementById("gallery");

function updateCenter() {
  const center = window.innerWidth / 2;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const cardCenter = rect.left + rect.width / 2;
    const dist = Math.abs(center - cardCenter);

    if (dist < 150) card.classList.add("active");
    else card.classList.remove("active");
  });
}

gallery.addEventListener("scroll", updateCenter);
window.addEventListener("load", updateCenter);

/* OPEN */
function openFolder(folder) {
  const viewer = document.getElementById("viewer");
  const g = document.getElementById("viewerGallery");

  g.innerHTML = "";

  folder.forEach(img => {
    g.innerHTML += `
      <div class="viewer-card" onclick="openFullscreen('${img}')">
        <img src="${img}">
      </div>
    `;
  });

  viewer.classList.add("active");
}

/* CLOSE */
function closeFolder() {
  document.getElementById("viewer").classList.remove("active");
}

/* FULLSCREEN */
function openFullscreen(src) {
  document.getElementById("fullscreenImg").src = src;
  document.getElementById("fullscreen").classList.add("active");
}

function closeFullscreen() {
  document.getElementById("fullscreen").classList.remove("active");
}

</script>

</body>
</html>
