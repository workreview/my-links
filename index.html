<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #5a0f1a;
  color: white;
  overflow-x: hidden;
}

/* LOGO */
.logo {
  display:flex;
  justify-content:center;
  padding:20px;
}

.logo img {
  width:120px;
  height:120px;
  border-radius:20px;
}

/* HORIZONTAL FOLDERS */
.gallery {
  display:flex;
  gap:20px;
  padding:40px 20px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

/* CARD */
.card {
  min-width:250px;
  height:280px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  transition:0.4s;
  scroll-snap-align:center;
  transform:scale(0.8);
  filter:blur(2px);
}

/* CENTER FOCUS */
.card.active {
  transform:scale(1.2);
  filter:blur(0);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* IMAGE */
.img-box img {
  width:100%;
  height:80%;
  object-fit:cover;
}

.content {
  text-align:center;
  padding:10px;
}

/* VIEWER */
.viewer {
  position:fixed;
  inset:0;
  background:#5a0f1a;
  display:none;
  flex-direction:column;
}

.viewer.active {
  display:flex;
}

/* INSIDE FOLDER (VERTICAL STACK) */
.viewer-gallery {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:20px;
  overflow-y:auto;
}

/* IMAGE STACK STYLE */
.viewer-card {
  width:80%;
  border-radius:20px;
  overflow:hidden;
  transition:0.4s;
  transform:scale(0.8);
  filter:blur(2px);
}

.viewer-card.active {
  transform:scale(1.1);
  filter:blur(0);
}

.viewer-card img {
  width:100%;
}

/* FULLSCREEN */
.fullscreen {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.fullscreen.active {
  display:flex;
}

.fullscreen img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg">
</div>

<!-- FOLDERS -->
<section class="gallery" id="gallery">

  <!-- repeat 10 -->
  <div class="card" onclick="openFolder(folder1)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">1</div></div>
  <div class="card" onclick="openFolder(folder2)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">2</div></div>
  <div class="card" onclick="openFolder(folder3)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">3</div></div>
  <div class="card" onclick="openFolder(folder4)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">4</div></div>
  <div class="card" onclick="openFolder(folder5)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">5</div></div>
  <div class="card" onclick="openFolder(folder6)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">6</div></div>
  <div class="card" onclick="openFolder(folder7)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">7</div></div>
  <div class="card" onclick="openFolder(folder8)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">8</div></div>
  <div class="card" onclick="openFolder(folder9)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">9</div></div>
  <div class="card" onclick="openFolder(folder10)"><div class="img-box"><img src="https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg"></div><div class="content">10</div></div>

</section>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <div onclick="closeFolder()">⬅ Back</div>
  <div class="viewer-gallery" id="viewerGallery"></div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="fullscreen" onclick="closeFullscreen()">
  <img id="fullscreenImg">
</div>

<script>
const img = "https://i.postimg.cc/rwFrR63Q/b4322f0401cc60b14e15340ebf387422.jpg";

const folder1 = [img,img,img,img,img,img,img,img,img,img];
const folder2 = [img,img,img,img,img,img,img,img,img,img];
const folder3 = [img,img,img,img,img,img,img,img,img,img];
const folder4 = [img,img,img,img,img,img,img,img,img,img];
const folder5 = [img,img,img,img,img,img,img,img,img,img];
const folder6 = [img,img,img,img,img,img,img,img,img,img];
const folder7 = [img,img,img,img,img,img,img,img,img,img];
const folder8 = [img,img,img,img,img,img,img,img,img,img];
const folder9 = [img,img,img,img,img,img,img,img,img,img];
const folder10 = [img,img,img,img,img,img,img,img,img,img];

/* center focus folders */
const cards = document.querySelectorAll(".card");
const gallery = document.getElementById("gallery");

function updateCenter() {
  const center = window.innerWidth / 2;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const cardCenter = rect.left + rect.width / 2;
    const dist = Math.abs(center - cardCenter);

    if (dist < 150) card.classList.add("active");
    else card.classList.remove("active");
  });
}

gallery.addEventListener("scroll", updateCenter);
window.addEventListener("load", updateCenter);

/* open folder */
function openFolder(folder) {
  const viewer = document.getElementById("viewer");
  const gallery = document.getElementById("viewerGallery");

  gallery.innerHTML = "";

  folder.forEach(img => {
    gallery.innerHTML += `
      <div class="viewer-card" onclick="openFullscreen('${img}')">
        <img src="${img}">
      </div>
    `;
  });

  viewer.classList.add("active");

  setTimeout(updateViewerCenter, 100);
}

/* viewer focus */
function updateViewerCenter() {
  const cards = document.querySelectorAll(".viewer-card");
  const center = window.innerHeight / 2;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const c = rect.top + rect.height / 2;
    const dist = Math.abs(center - c);

    if (dist < 150) card.classList.add("active");
    else card.classList.remove("active");
  });
}

document.getElementById("viewerGallery").addEventListener("scroll", updateViewerCenter);

function closeFolder() {
  document.getElementById("viewer").classList.remove("active");
}

/* fullscreen */
function openFullscreen(src) {
  document.getElementById("fullscreenImg").src = src;
  document.getElementById("fullscreen").classList.add("active");
}

function closeFullscreen() {
  document.getElementById("fullscreen").classList.remove("active");
}
</script>

</body>
</html>
