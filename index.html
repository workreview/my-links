<title>Mahmoud Ali | Gamer</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    text-align: center;
}

/* glowing background effect */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #00f0ff33, transparent 60%);
    animation: move 6s infinite alternate;
}
@keyframes move {
    from { transform: translate(-20%, -20%); }
    to { transform: translate(20%, 20%); }
}

.container {
    position: relative;
    max-width: 400px;
    margin: auto;
    padding: 40px 20px;
    z-index: 1;
}

/* profile image */
img {
    width: 110px;
    border-radius: 50%;
    border: 3px solid #00f0ff;
    box-shadow: 0 0 20px #00f0ff;
    margin-bottom: 15px;
}

/* name */
h2 {
    font-size: 26px;
    text-shadow: 0 0 10px #00f0ff;
}

/* bio */
p {
    opacity: 0.8;
    margin-bottom: 25px;
}

/* links */
.link {
    display: block;
    background: #020617;
    border: 2px solid #00f0ff;
    color: #00f0ff;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 0 10px #00f0ff33;
}

/* hover effect */
.link:hover {
    background: #00f0ff;
    color: black;
    box-shadow: 0 0 20px #00f0ff;
    transform: scale(1.05);
}
</style>
</head>
